<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ app_name }} Install</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="card">
    <h1>{{ app_name }}</h1>
    <p>Временная ссылка для установки iOS-приложения.</p>
    <p id="timer" class="muted">Время жизни ссылки: --:--:--</p>
    <a class="btn" href="{{ itms_link }}">Install</a>
    <button class="btn secondary" id="copy-link" data-link="{{ public_url }}">Copy Link</button>
  </main>
  <script src="/static/install.js"></script>
  <script>window.__secondsLeft={{ seconds_left }};</script>
</body>
</html>
